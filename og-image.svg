<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="178" cy="323" r="95" fill="#0a1628" opacity="0.07"/>
    <circle cx="639" cy="555" r="96" fill="#0a1628" opacity="0.10"/>
    <circle cx="1226" cy="222" r="26" fill="#0a1628" opacity="0.05"/>
    <circle cx="1016" cy="235" r="33" fill="#0a1628" opacity="0.18"/>
    <circle cx="953" cy="550" r="22" fill="#0a1628" opacity="0.15"/>
    <circle cx="329" cy="682" r="57" fill="#0a1628" opacity="0.09"/>
    <rect x="-21" y="137" width="65" height="51" rx="8" fill="#0d2137" opacity="0.08" transform="rotate(31, 626, 408)"/>
    <rect x="152" y="95" width="66" height="25" rx="8" fill="#0d2137" opacity="0.09" transform="rotate(13, 86, 175)"/>
    <rect x="552" y="422" width="29" height="53" rx="8" fill="#0d2137" opacity="0.04" transform="rotate(43, 1263, -66)"/>
    <rect x="106" y="404" width="93" height="84" rx="8" fill="#0d2137" opacity="0.07" transform="rotate(25, 772, -84)"/>
    <rect x="-80" y="466" width="39" height="29" rx="8" fill="#0d2137" opacity="0.09" transform="rotate(44, 150, -90)"/>
    <rect x="-100" y="482" width="28" height="90" rx="8" fill="#0d2137" opacity="0.05" transform="rotate(5, 543, 602)"/>
    <rect x="-91" y="-92" width="72" height="61" rx="8" fill="#0d2137" opacity="0.05" transform="rotate(5, -45, 241)"/>
    <rect x="1149" y="593" width="30" height="77" rx="8" fill="#0d2137" opacity="0.14" transform="rotate(13, 1132, 292)"/>
    <polygon points="772,162 847,312 697,312" fill="#0a1628" opacity="0.06"/>
    <polygon points="1178,118 1270,302 1086,302" fill="#0a1628" opacity="0.05"/>
    <polygon points="551,127 640,305 462,305" fill="#0a1628" opacity="0.04"/>
    <polygon points="134,143 226,327 42,327" fill="#0a1628" opacity="0.05"/>

  <!-- Wave at bottom -->
  <path d="M0,578 C360,604 840,552 1200,578 L1200,630 L0,630Z" fill="#0a1628" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    백링크 자동화 프로그램
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 서버 웜업
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#00bcd4" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 백링크 자동화 프로그램 — 서버 웜업
  </text>
</svg>